version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  opa:
    image: openpolicyagent/opa:0.68.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ./docker/opa/policies:/policies:ro
    networks:
      - internal

  authz_proxy:
    build:
      context: .
      dockerfile: docker/authz_proxy/Dockerfile
    volumes:
      - ./state:/state
    environment:
      - STATE_ROOT=/state
      - JWT_DIR=/state/jwt
      - OPA_URL=http://opa:8181/v1/data/govportal/authz/allow
    depends_on:
      - opa
    networks:
      - internal

  doc_service:
    build:
      context: .
      dockerfile: docker/doc_service/Dockerfile
    volumes:
      - /home/hnh/Documents/openssl/openssl-3.6.1:/opt/openssl:ro
      - ./state:/state
      - ../../domain_key/local_private/pki:/state/pki
      - ./state/mtls:/etc/nginx/mtls:ro
    environment:
      - OPENSSL_DIR=/opt/openssl
      - OPENSSL_BIN=/opt/openssl/bin/openssl
      - OPENSSL_LIB_DIR=/opt/openssl/lib64
      - OPENSSL_MODULES=/opt/openssl/lib64/ossl-modules
      - OPENSSL_CONF=/opt/openssl/openssl.cnf
      - LD_LIBRARY_PATH=/opt/openssl/lib64
      - PATH=/opt/openssl/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docdb
      - DOC_STATE_DIR=/state
      - STATE_ROOT=/state
      - STORAGE_SERVICE_URL=http://storage_service:9003
    networks:
      - internal

  storage_service:
    build:
      context: .
      dockerfile: docker/storage_service/Dockerfile
    volumes:
      - ./state:/state
      - ./state/mtls:/etc/nginx/mtls:ro
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docdb
      - STATE_ROOT=/state
      - JWT_DIR=/state/jwt
    networks:
      - internal

  qr_service:
    build:
      context: .
      dockerfile: docker/qr_service/Dockerfile
    volumes:
      - ./state/mtls:/etc/nginx/mtls:ro
    environment:
      - QR_TTL=300
    networks:
      - internal

  portals:
    image: python:3.11-slim
    working_dir: /app/portals
    volumes:
      - ./portals:/app/portals:ro
      - ../../domain_key/local_private:/app/local_private
      - /home/hnh/Documents/openssl/openssl-3.6.1:/opt/openssl:ro
    command: ["python3", "start_portals.py"]
    environment:
      - OPENSSL_BIN=/opt/openssl/bin/openssl
      - OPENSSL_LIB_DIR=/opt/openssl/lib64
      - OPENSSL_MODULES=/opt/openssl/lib64/ossl-modules
      - OPENSSL_CONF=/opt/openssl/openssl.cnf
      - LD_LIBRARY_PATH=/opt/openssl/lib64
      - LOCAL_PRIVATE_DIR=/app/local_private
    depends_on:
      - gateway
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:3002:3002"
      - "127.0.0.1:3003:3003"
      - "127.0.0.1:3004:3004"
    networks:
      - public

  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    volumes:
      - ./state/mtls:/etc/nginx/mtls:ro
    depends_on:
      - authz_proxy
      - storage_service
      - doc_service
      - qr_service
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    networks:
      - internal
      - public

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
