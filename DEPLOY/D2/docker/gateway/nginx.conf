events {}
http {
  map $http_origin $cors_origin {
    default "";
    # Any host (IP, hostname, localhost) on portal dev ports 3000-3004.
    "~^https?://[^/]+:300[0-4]$" $http_origin;
  }

  upstream storage_up {
    server storage_service:9443;
  }
  upstream doc_up {
    server doc_service:5443;
  }
  upstream qr_up {
    server qr_service:5443;
  }
  upstream authz_up {
    server authz_proxy:9191;
  }

  server {
    listen 80;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-User-ID, X-User-Type" always;
    add_header Vary "Origin" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location = /_opa_auth {
      internal;
      proxy_pass http://authz_up/auth;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Original-Method $request_method;
      proxy_set_header X-Original-URI $request_uri;
    }

    location @auth_unauthorized {
      default_type application/json;
      return 401 '{"error":"Unauthorized"}';
    }

    location @auth_forbidden {
      default_type application/json;
      return 403 '{"error":"Forbidden by OPA policy"}';
    }

    include /etc/nginx/conf.d/proxy_storage_public.conf;
    include /etc/nginx/conf.d/proxy_storage_protected.conf;
    include /etc/nginx/conf.d/proxy_other.conf;
  }

  server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/mtls/gateway/server.crt;
    ssl_certificate_key /etc/nginx/mtls/gateway/server.key;
    ssl_client_certificate /etc/nginx/mtls/ca/ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-User-ID, X-User-Type" always;
    add_header Vary "Origin" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location = /_opa_auth {
      internal;
      proxy_pass http://authz_up/auth;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Original-Method $request_method;
      proxy_set_header X-Original-URI $request_uri;
    }

    location @auth_unauthorized {
      default_type application/json;
      return 401 '{"error":"Unauthorized"}';
    }

    location @auth_forbidden {
      default_type application/json;
      return 403 '{"error":"Forbidden by OPA policy"}';
    }

    include /etc/nginx/conf.d/proxy_storage_public.conf;
    include /etc/nginx/conf.d/proxy_storage_protected.conf;
    include /etc/nginx/conf.d/proxy_other.conf;
  }
}
