
upstream govportal_gateway {
  server 127.0.0.1:8080;
}

upstream govportal_officer_portal {
  server 127.0.0.1:3003;
}

upstream govportal_thirdparty_portal {
  server 127.0.0.1:3004;
}

server {
  listen 80;
  server_name citizens.gt.tc dbadmin.gt.tc thirdparties.gt.tc pki.gt.tc officers.gt.tc;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name citizens.gt.tc;

  ssl_certificate     DOMAIN_CERT_FULLCHAIN;
  ssl_certificate_key DOMAIN_CERT_KEY;

  root PORTAL_ROOT;
  index citizen.html;

  location = / { try_files /citizen.html =404; }
  location / { try_files $uri /citizen.html =404; }

  location /api/ {
    proxy_pass http://govportal_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

}

server {
  listen 443 ssl http2;
  server_name dbadmin.gt.tc;

  ssl_certificate     DOMAIN_CERT_FULLCHAIN;
  ssl_certificate_key DOMAIN_CERT_KEY;
  ssl_client_certificate CLIENT_CA;
  ssl_verify_client on;
  ssl_verify_depth 2;
  if ($ssl_client_s_dn !~ "CN=storage-admin@dbadmin\.gt\.tc") { return 403; }

  root PORTAL_ROOT;
  index storage.html;

  location = / { try_files /storage.html =404; }
  location / { try_files $uri /storage.html =404; }

  location /api/ {
    proxy_pass http://govportal_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
  }

}

server {
  listen 443 ssl http2;
  server_name thirdparties.gt.tc;

  ssl_certificate     DOMAIN_CERT_FULLCHAIN;
  ssl_certificate_key DOMAIN_CERT_KEY;
  ssl_client_certificate CLIENT_CA;
  ssl_verify_client on;
  ssl_verify_depth 2;
  if ($ssl_client_s_dn !~ "CN=[A-Za-z0-9_.-]+@thirdparties\.hnh2511\.xyz") { return 403; }

  root PORTAL_ROOT;
  index thirdparty.html;

  location = / { try_files /thirdparty.html =404; }
  location / { try_files $uri /thirdparty.html =404; }

  location /api/ {
    proxy_pass http://govportal_gateway;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
    proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
    proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
  }

  location = /__keypair {
    proxy_pass http://govportal_thirdparty_portal;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

