- name: Setup VM-Internal — Services (includes former mgmt roles)
  hosts: internal
  become: yes
  vars:
    internal_bind_ip: 10.0.1.11
    storage_service_url: http://storage-service:9003
    # Secrets are provided via environment variables or mounted files for local runs
  roles:
    - docker_runtime
    - internal_ca
    - keycloak_service
    - opa_service
    - storage_service
    - doc_service
    - redis_service
    - qr_service
    - keypair_rotation
  pre_tasks:
    - name: Copy pre-built OpenSSL 3.6.1 from host
      copy:
        src: /home/hnh/Documents/openssl/openssl-3.6.1/
        dest: /opt/openssl-src/
        owner: root
        group: root
        mode: '0755'
    - name: Build/install OpenSSL 3.6.1 on VM
      shell: |
        set -e
        if [ -f /opt/openssl/bin/openssl ]; then
          echo "OpenSSL already installed"
          exit 0
        fi
        cd /opt/openssl-src
        if [ ! -f Makefile ]; then
          echo "Running make install from pre-built source..."
          make install_sw
          echo "Build artifacts missing, attempting reconfigure and rebuild..."
          ./config --prefix=/opt/openssl --openssldir=/opt/openssl shared no-tests
          make -j"$(nproc)"
          make install_sw
        else
          echo "Makefile exists, running make install_sw..."
          make install_sw
        fi
        chmod -R 0755 /opt/openssl/bin /opt/openssl/lib64 2>/dev/null || true
        ln -sfn /opt/openssl/lib64/ossl-modules /opt/openssl/providers 2>/dev/null || true
        ln -sfn /opt/openssl/bin/openssl /opt/openssl/openssl 2>/dev/null || true
        echo "OpenSSL installation complete"
      args:
        executable: /bin/bash
      changed_when: true
  post_tasks:
    - name: Copy storage DB credentials to db VM
      shell: |
        set -e
        if [ -f /root/storage-db-creds.txt ]; then
          echo "[info] Credentials file found, attempting copy to db-vm..."
          scp -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o IdentityFile={{ ssh_key }} \
              -p {{ hostvars.get('db-vm', {}).get('ansible_port', '2201') }} \
              /root/storage-db-creds.txt \
              {{ hostvars.get('db-vm', {}).get('ansible_user', 'vagrant') }}@{{ hostvars.get('db-vm', {}).get('ansible_host', '127.0.0.1') }}:/root/ || \
              echo "[warn] SCP to db-vm may have failed but will continue"
        fi
      args:
        executable: /bin/bash
      vars:
        ssh_key: "{{ hostvars.get('internal-vm', {}).get('ansible_ssh_private_key_file', '~/.ssh/id_rsa') }}"
      changed_when: false
      ignore_errors: yes

- name: Setup VM-DMZ — Gateway
  hosts: dmz
  become: yes
  vars:
    gateway_listen_ip: 10.0.1.10
    gateway_listen_port: 8080
    citizen_port: 8081
    officer_port: 8082
    pki_port: 8083
    thirdparty_port: 8084
    storage_admin_port: 8085
    internal_service_ip: 10.0.1.11
  roles:
    - docker_runtime
    - dmz_gateway

- name: Setup VM-DB — Postgres
  hosts: db
  become: yes
  roles:
    - docker_runtime
  tasks:
    - name: Ensure docker network internal-net exists
      shell: docker network inspect internal-net >/dev/null 2>&1 || docker network create internal-net
      args:
        executable: /bin/bash

    - name: Ensure storage-postgres data volume exists
      shell: docker volume inspect storage-postgres-data >/dev/null 2>&1 || docker volume create storage-postgres-data
      args:
        executable: /bin/bash

    - name: Restrict PostgreSQL access to storage service host only
      shell: |
        set -e
        iptables -C DOCKER-USER -p tcp -s {{ hostvars.get('internal-vm', {}).get('vm_network_ip', '10.0.1.11') }} --dport 5432 -j ACCEPT >/dev/null 2>&1 || \
          iptables -I DOCKER-USER 1 -p tcp -s {{ hostvars.get('internal-vm', {}).get('vm_network_ip', '10.0.1.11') }} --dport 5432 -j ACCEPT
        iptables -C DOCKER-USER -p tcp --dport 5432 -j DROP >/dev/null 2>&1 || \
          iptables -I DOCKER-USER 2 -p tcp --dport 5432 -j DROP
      args:
        executable: /bin/bash

    - name: Start Postgres container for storage
      shell: |
        set -e
        # Source credentials from internal VM (copied via post_task) or use fallbacks
        if [ -f /root/storage-db-creds.txt ]; then
          source /root/storage-db-creds.txt
        else
          STORAGE_DB_NAME=${STORAGE_DB_NAME:-govportal_storage}
          STORAGE_DB_USER=${STORAGE_DB_USER:-govportal_storage}
          STORAGE_DB_PASSWORD=${STORAGE_DB_PASSWORD:-change_me}
        fi
        docker rm -f storage-postgres >/dev/null 2>&1 || true
        docker run -d --name storage-postgres \
          --network internal-net \
          -p 5432:5432 \
          --restart unless-stopped \
          --health-cmd="pg_isready -U ${STORAGE_DB_USER} -d ${STORAGE_DB_NAME} || exit 1" \
          --health-interval=10s \
          --health-timeout=5s \
          --health-retries=5 \
          -e POSTGRES_DB=${STORAGE_DB_NAME} \
          -e POSTGRES_USER=${STORAGE_DB_USER} \
          -e POSTGRES_PASSWORD=${STORAGE_DB_PASSWORD} \
          -v storage-postgres-data:/var/lib/postgresql/data \
          postgres:16
      args:
        executable: /bin/bash
      changed_when: true
