all:
  children:
    db:
      hosts:
        db-vm:
          ansible_host: 127.0.0.1
          ansible_port: "{{ lookup('env', 'DB_SSH_PORT') | default('2201', true) }}"
          ansible_user: vagrant
          ansible_ssh_private_key_file: "{{ lookup('env', 'D2_DIR') }}/.vagrant/machines/db/virtualbox/private_key"
          ansible_ssh_common_args: '-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa -o IdentitiesOnly=yes'
          vm_network_ip: 10.0.1.12
    internal:
      hosts:
        internal-vm:
          ansible_host: 127.0.0.1
          ansible_port: "{{ lookup('env', 'INTERNAL_SSH_PORT') | default('2200', true) }}"
          ansible_user: vagrant
          ansible_ssh_private_key_file: "{{ lookup('env', 'D2_DIR') }}/.vagrant/machines/internal/virtualbox/private_key"
          ansible_ssh_common_args: '-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa -o IdentitiesOnly=yes'
          vm_network_ip: 10.0.1.11
    dmz:
      hosts:
        dmz-vm:
          ansible_host: 127.0.0.1
          ansible_port: "{{ lookup('env', 'DMZ_SSH_PORT') | default('2222', true) }}"
          ansible_user: vagrant
          ansible_ssh_private_key_file: "{{ lookup('env', 'D2_DIR') }}/.vagrant/machines/dmz/virtualbox/private_key"
          ansible_ssh_common_args: '-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa -o IdentitiesOnly=yes'
          vm_network_ip: 10.0.1.10
