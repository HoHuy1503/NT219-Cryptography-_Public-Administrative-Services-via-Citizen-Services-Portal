- name: Ensure OpenSSL is installed
  apt:
    name: openssl
    state: present
    update_cache: yes

- name: Ensure local OpenSSL bundle directories exist
  file:
    path: /opt/openssl/providers
    state: directory
    mode: '0755'

- name: Ensure NGINX cert directory exists
  file:
    path: /etc/nginx/certs
    state: directory
    mode: '0755'

- name: Generate self-signed certificate for gateway
  shell: |
    set -e
    if [ ! -f /etc/nginx/certs/server.crt ] || [ ! -f /etc/nginx/certs/server.key ]; then
      export LD_LIBRARY_PATH=/opt/openssl/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      /opt/openssl/bin/openssl ecparam -name prime256v1 -genkey -noout \
        -out /etc/nginx/certs/server.key
      /opt/openssl/bin/openssl req -x509 -new -days 365 \
        -key /etc/nginx/certs/server.key \
        -subj "/CN=govportal-dmz" \
        -out /etc/nginx/certs/server.crt
    fi
  args:
    executable: /bin/bash
  changed_when: false