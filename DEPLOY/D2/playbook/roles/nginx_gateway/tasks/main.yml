- name: Install NGINX
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Ensure cert directory exists
  file:
    path: /etc/nginx/certs
    state: directory
    mode: '0755'

- name: Configure NGINX gateway
  copy:
    dest: /etc/nginx/sites-available/govportal.conf
    mode: '0644'
    content: |
      server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        location /api/documents {
          proxy_pass http://{{ backend_doc_service }};
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/qr {
          proxy_pass http://{{ backend_qr_service }};
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /realms {
          proxy_pass http://{{ backend_keycloak }};
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }

- name: Enable NGINX gateway site
  file:
    src: /etc/nginx/sites-available/govportal.conf
    dest: /etc/nginx/sites-enabled/govportal.conf
    state: link

- name: Disable default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Restart NGINX
  systemd:
    name: nginx
    state: restarted
    enabled: yes
