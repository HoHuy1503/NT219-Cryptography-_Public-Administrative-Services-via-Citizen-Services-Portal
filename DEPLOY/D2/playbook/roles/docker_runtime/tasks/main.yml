- name: Install Docker runtime dependencies
  apt:
    name:
      - docker.io
      - python3-pip
      - jq
      - curl
    state: present
    update_cache: yes

- name: Ensure Docker service is enabled
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Add vagrant user to docker group
  user:
    name: vagrant
    groups: docker
    append: yes
