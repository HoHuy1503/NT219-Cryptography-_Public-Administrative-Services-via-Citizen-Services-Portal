---
- name: Install Docker runtime packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present
    update_cache: true

- name: Enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add vagrant user to docker group
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: true
