---
- name: Create keypair rotation script directory
  file:
    path: /opt/govportal/scripts
    state: directory
    mode: '0755'

- name: Write keypair rotation script
  copy:
    dest: /opt/govportal/scripts/rotate-officer-keys.py
    mode: '0755'
    content: |
      #!/usr/bin/env python3
      """
      Rotate officer EC keypairs (P-256) every 3 months via auto_rotate_at trigger
      Script connects to storage-service and generates new public keys for due officers
      Stores new keys with is_current=True and expires_at=+365 days
      """
      import os
      import sys
      import json
      import time
      import requests
      from datetime import datetime, timedelta, timezone
      from cryptography.hazmat.primitives.asymmetric import ec
      from cryptography.hazmat.backends import default_backend
      from cryptography.hazmat.primitives import serialization

      STORAGE_URL = os.environ.get("STORAGE_SERVICE_URL", "http://10.0.1.11:9003")
      AUTH_TOKEN = os.environ.get("AUTH_TOKEN", "")

      def get_storage_headers():
          return {
              "Authorization": f"Bearer {AUTH_TOKEN}" if AUTH_TOKEN else "",
              "Content-Type": "application/json"
          }

      def get_officers_due_rotation():
          """Fetch all officers from storage service"""
          try:
              resp = requests.get(
                  f"{STORAGE_URL}/api/storage/users?role=OFFICER&limit=1000",
                  headers=get_storage_headers(),
                  timeout=5
              )
              resp.raise_for_status()
              return resp.json().get("users", [])
          except Exception as e:
              print(f"ERROR: Failed to list officers: {e}", file=sys.stderr)
              return []

      def get_user_keys(user_id):
          """Fetch current keys for officer"""
          try:
              resp = requests.get(
                  f"{STORAGE_URL}/api/storage/users/{user_id}/keys",
                  headers=get_storage_headers(),
                  timeout=5
              )
              resp.raise_for_status()
              return resp.json().get("keys", [])
          except Exception as e:
              print(f"ERROR: Failed to fetch keys for {user_id}: {e}", file=sys.stderr)
              return []

      def is_rotation_due(user_id, keys):
          """Check if officer's current key needs rotation"""
          current_key = next((k for k in keys if k.get("is_current")), None)
          if not current_key:
              return False  # No current key yet
          
          auto_rotate_at = current_key.get("auto_rotate_at")
          if not auto_rotate_at:
              return False  # No rotation schedule
          
          # Parse ISO 8601 timestamp
          try:
              rotate_time = datetime.fromisoformat(auto_rotate_at.replace("Z", "+00:00"))
              return datetime.now(timezone.utc) >= rotate_time
          except Exception as e:
              print(f"WARN: Invalid auto_rotate_at for {user_id}: {auto_rotate_at}", file=sys.stderr)
              return False

      def generate_ec_keypair():
          """Generate P-256 EC keypair"""
          private_key = ec.generate_private_key(ec.SECP256R1(), default_backend())
          public_key = private_key.public_key()
          
          public_pem = public_key.public_bytes(
              encoding=serialization.Encoding.PEM,
              format=serialization.PublicFormat.SubjectPublicKeyInfo
          ).decode()
          
          return public_pem

      def rotate_key(user_id, public_key_pem):
          """POST new key to storage service"""
          try:
              payload = {
                  "public_key_pem": public_key_pem,
                  "key_type": "EC_P256"
              }
              resp = requests.post(
                  f"{STORAGE_URL}/api/storage/users/{user_id}/keys",
                  json=payload,
                  headers=get_storage_headers(),
                  timeout=5
              )
              resp.raise_for_status()
              result = resp.json()
              return {
                  "success": True,
                  "key_id": result.get("key_id"),
                  "key_version": result.get("key_version")
              }
          except Exception as e:
              print(f"ERROR: Failed to rotate key for {user_id}: {e}", file=sys.stderr)
              return {"success": False, "error": str(e)}

      def main():
          print(f"[{datetime.now().isoformat()}] Starting keypair rotation check...")
          
          officers = get_officers_due_rotation()
          print(f"Found {len(officers)} officers")
          
          rotated_count = 0
          for officer in officers:
              user_id = officer["user_id"]
              keys = get_user_keys(user_id)
              
              if is_rotation_due(user_id, keys):
                  print(f"  Rotating key for {user_id}...")
                  new_public_pem = generate_ec_keypair()
                  result = rotate_key(user_id, new_public_pem)
                  
                  if result["success"]:
                      print(f"    ✓ Rotated to key_version {result['key_version']}")
                      rotated_count += 1
                  else:
                      print(f"    ✗ Failed: {result.get('error')}")
          
          print(f"[{datetime.now().isoformat()}] Rotation complete: {rotated_count}/{len(officers)} officers rotated")
          return 0 if rotated_count >= 0 else 1

      if __name__ == "__main__":
          sys.exit(main())

- name: Write cron job for keypair rotation (daily check for due rotations)
  cron:
    name: "Rotate officer keypairs if due"
    minute: "0"
    hour: "2"
    job: "python3 /opt/govportal/scripts/rotate-officer-keys.py >> /var/log/govportal-rotation.log 2>&1"
    user: root

- name: Create rotation log file
  file:
    path: /var/log/govportal-rotation.log
    state: touch
    mode: '0644'
