---
- name: Ensure doc-service source directory exists
  ansible.builtin.file:
    path: /opt/govportal/doc-service
    state: directory
    mode: "0755"

- name: Copy doc-service source
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../D1/doc-service/"
    dest: /opt/govportal/doc-service/
    mode: "0755"

- name: Build doc-service image
  ansible.builtin.command:
    cmd: docker build -t govportal-doc-service:latest /opt/govportal/doc-service

- name: Start doc-service container
  ansible.builtin.shell: |
    set -e
    docker network create internal-net >/dev/null 2>&1 || true
    docker network create mgmt-net >/dev/null 2>&1 || true
    docker rm -f doc-service >/dev/null 2>&1 || true

    docker run -d --name doc-service \
      --network internal-net \
      -p {{ doc_service_port }}:5000 \
      -e VAULT_ADDR='{{ vault_addr }}' \
      -e VAULT_TOKEN='{{ vault_token }}' \
      -e FALCON_KV_MOUNT='{{ falcon_kv_mount }}' \
      -e FALCON_ROTATION_SECONDS='{{ falcon_rotation_seconds }}' \
      govportal-doc-service:latest

    docker network connect mgmt-net doc-service >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
