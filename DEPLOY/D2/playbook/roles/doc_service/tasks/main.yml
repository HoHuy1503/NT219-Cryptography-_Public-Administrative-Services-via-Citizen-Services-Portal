- name: Ensure doc-service source directory exists
  file:
    path: /opt/govportal/doc-service
    state: directory
    mode: '0755'

- name: Ensure doc-service state directory exists (for persisted keys)
  file:
    path: /opt/govportal/doc-service/state
    state: directory
    mode: '0700'

- name: Ensure doc-service OpenSSL bundle directories exist
  file:
    path: /opt/govportal/doc-service/openssl/providers
    state: directory
    mode: '0755'

- name: Copy VM-built OpenSSL install for doc-service build parity
  shell: |
    set -e
    rm -rf /opt/govportal/doc-service/openssl
    cp -a /opt/openssl /opt/govportal/doc-service/openssl
  args:
    executable: /bin/bash

- name: Write doc-service app with ML-DSA support
  copy:
    src: app.py
    dest: /opt/govportal/doc-service/app.py
    mode: '0644'

- name: Write doc-service Dockerfile
  copy:
    dest: /opt/govportal/doc-service/Dockerfile
    mode: '0644'
    content: |
      FROM python:3.11-slim
      WORKDIR /app
      RUN python -m pip install --upgrade pip
      RUN pip install --no-cache-dir cryptography flask requests
      COPY app.py .
      COPY openssl/ /opt/openssl/
      ENV OPENSSL_BIN=/opt/openssl/bin/openssl
      ENV OPENSSL_LIB_DIR=/opt/openssl/lib64
      ENV OPENSSL_MODULES=/opt/openssl/lib64/ossl-modules
      ENV LD_LIBRARY_PATH=/opt/openssl/lib64
      EXPOSE 5000
      CMD ["python", "app.py"]

- name: Build and run doc-service container
  shell: |
    set -e
    docker network inspect internal-net >/dev/null 2>&1 || docker network create internal-net
    docker build -t govportal-doc-service /opt/govportal/doc-service
    docker rm -f doc-service >/dev/null 2>&1 || true
    docker run -d --name doc-service \
      --network internal-net \
      --restart unless-stopped \
      --health-cmd="python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\" || exit 1" \
      --health-interval=10s \
      --health-timeout=5s \
      --health-retries=3 \
      -v /opt/govportal/doc-service/state:/state:rw \
      -e STORAGE_SERVICE_URL="{{ storage_service_url }}" \
      -e ML_ENABLED=true \
      -e DOC_STATE_DIR=/state \
      -p {{ internal_bind_ip }}:5000:5000 \
      govportal-doc-service
  args:
    executable: /bin/bash
  changed_when: true
