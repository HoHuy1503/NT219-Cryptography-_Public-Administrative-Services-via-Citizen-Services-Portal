---
- name: Ensure qr-service source directory exists
  ansible.builtin.file:
    path: /opt/govportal/qr-service
    state: directory
    mode: "0755"

- name: Copy qr-service source
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../D1/qr-service/"
    dest: /opt/govportal/qr-service/
    mode: "0755"

- name: Build qr-service image
  ansible.builtin.command:
    cmd: docker build -t govportal-qr-service:latest /opt/govportal/qr-service

- name: Start qr-service container
  ansible.builtin.shell: |
    set -e
    docker network create internal-net >/dev/null 2>&1 || true
    docker rm -f qr-service >/dev/null 2>&1 || true

    docker run -d --name qr-service \
      --network internal-net \
      -p {{ qr_service_port }}:5002 \
      -e REDIS_HOST='{{ redis_host }}' \
      govportal-qr-service:latest
  args:
    executable: /bin/bash
