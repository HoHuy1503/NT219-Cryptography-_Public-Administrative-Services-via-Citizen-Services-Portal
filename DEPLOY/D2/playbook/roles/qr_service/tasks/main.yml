- name: Ensure qr-service source directory exists
  file:
    path: /opt/govportal/qr-service
    state: directory
    mode: '0755'

- name: Write qr-service app
  copy:
    dest: /opt/govportal/qr-service/app.py
    mode: '0644'
    content: |
      import redis, json, uuid, time, base64, os, logging, requests
      import hashlib
      import subprocess
      import tempfile
      from pathlib import Path
      from flask import Flask, request, jsonify
      from cryptography.fernet import Fernet
      # Secrets are loaded from environment variables or state files

      logging.basicConfig(level=logging.INFO,
        format='{"ts":"%(asctime)s","level":"%(levelname)s","msg":"%(message)s"}')
      logger = logging.getLogger(__name__)

      app = Flask(__name__)

      @app.after_request
      def add_cors_headers(response):
        response.headers["Access-Control-Allow-Origin"] = "*"
        response.headers["Access-Control-Allow-Headers"] = "Content-Type, Authorization, X-Requested-With"
        response.headers["Access-Control-Allow-Methods"] = "GET, POST, OPTIONS"
        return response

      openssl_bin = os.environ.get("OPENSSL_BIN", "/opt/openssl/bin/openssl")
      openssl_lib_dir = os.environ.get("OPENSSL_LIB_DIR", "/opt/openssl/lib64")
      openssl_modules = os.environ.get("OPENSSL_MODULES", "/opt/openssl/lib64/ossl-modules")
      mlkem_algorithm = os.environ.get("MLKEM_ALGORITHM", "ML-KEM-512")
      session_label = os.environ.get("SESSION_DERIVATION_LABEL", "govportal-qr-session-v1")

      def build_openssl_env():
        env = os.environ.copy()
        existing_ld_library_path = env.get("LD_LIBRARY_PATH", "")
        if openssl_lib_dir:
          env["LD_LIBRARY_PATH"] = f"{openssl_lib_dir}:{existing_ld_library_path}" if existing_ld_library_path else openssl_lib_dir
        if openssl_modules:
          env["OPENSSL_MODULES"] = openssl_modules
        return env

      def run_openssl(args):
        return subprocess.run(
          [openssl_bin] + args,
          check=True,
          capture_output=True,
          env=build_openssl_env(),
        )

      def derive_session_key(shared_secret, nonce):
        material = hashlib.sha256(shared_secret + nonce.encode() + session_label.encode()).digest()
        return base64.b64encode(material).decode()

      def mlkem_encapsulate(public_key_pem):
        with tempfile.TemporaryDirectory() as tmpdir:
          tmpdir_path = Path(tmpdir)
          public_key_path = tmpdir_path / "recipient.pub.pem"
          ciphertext_path = tmpdir_path / "ciphertext.bin"
          secret_path = tmpdir_path / "shared-secret.bin"

          if isinstance(public_key_pem, (bytes, bytearray)):
            public_key_text = public_key_pem.decode()
          else:
            public_key_text = str(public_key_pem)

          public_key_path.write_text(public_key_text)

          run_openssl([
            "pkeyutl",
            "-encap",
            "-inkey", str(public_key_path),
            "-pubin",
            "-out", str(ciphertext_path),
            "-secret", str(secret_path),
          ])

          return ciphertext_path.read_bytes(), secret_path.read_bytes()
      
      # Retrieve Fernet key: prefer env `QR_FERNET_KEY`, then state file `/state/qr-fernet.key`, else deterministic fallback
      try:
        qr_key = os.environ.get("QR_FERNET_KEY", "")
        if qr_key:
          logger.info("Fernet key loaded from environment")
          qr_key = qr_key.encode()
        else:
          state_dir = os.environ.get("STATE_DIR", "/state")
          state_file = os.path.join(state_dir, "qr-fernet.key")
          if os.path.exists(state_file):
            with open(state_file, 'r', encoding='utf-8') as fh:
              key_txt = fh.read().strip()
            qr_key = key_txt.encode()
            logger.info("Fernet key loaded from state file")
          else:
            qr_key = base64.urlsafe_b64encode(hashlib.sha256(b"govportal-qr-fallback-key-123456").digest())
            logger.warning("Fernet key not provided; using built-in fallback Fernet key")
      except Exception as e:
        logger.warning(f"Failed to load Fernet key: {e}")
        qr_key = base64.urlsafe_b64encode(hashlib.sha256(b"govportal-qr-fallback-key-123456").digest())

      fernet = Fernet(qr_key)
      qr_ttl = int(os.environ.get("QR_TTL", "300"))

      # Connect to Redis with authentication
      redis_host = os.environ.get("REDIS_HOST", "redis")
      redis_port = int(os.environ.get("REDIS_PORT", "6379"))
      redis_pass = os.environ.get("REDIS_PASS", "")
      storage_url = os.environ.get("STORAGE_SERVICE_URL", "http://10.0.1.11:9003")
      
      try:
        r = redis.Redis(
          host=redis_host,
          port=redis_port,
          password=redis_pass if redis_pass else None,
          decode_responses=True,
          socket_connect_timeout=5
        )
        r.ping()
        logger.info("Redis connection successful")
      except Exception as e:
        logger.error(f"Redis connection failed: {e}")
        raise

      @app.route("/api/qr/generate", methods=["POST"])
      def generate_qr():
          try:
            user_id = request.get_json()["user_id"]
            nonce = str(uuid.uuid4())

            payload = json.dumps({
                "user_id": user_id,
                "nonce": nonce,
                "iat": time.time(),
                "exp": time.time() + qr_ttl
            })

            encrypted = fernet.encrypt(payload.encode())
            qr_data = base64.urlsafe_b64encode(encrypted).decode()
            r.setex(f"qr_pending:{nonce}", qr_ttl, user_id)
            
            logger.info(f"QR generated for user {user_id}")
            return jsonify({
                "nonce": nonce,
                "qr_data": qr_data,
                "expires_in": qr_ttl
            }), 201
          except Exception as e:
            logger.error(f"QR generation failed: {e}")
            return jsonify({"error": "QR generation failed"}), 500

      @app.route("/api/qr/document-qr", methods=["POST"])
      def generate_document_qr():
          """
          Generate document QR with format: key(b64)|data|metadata
          Used for physical documents/certificates that citizens scan
          """
          try:
            data = request.get_json(force=True)
            document_id = data.get("document_id") or str(uuid.uuid4())
            document_type = data.get("document_type", "certificate")
            document_data = data.get("document_data", "")
            metadata = data.get("metadata", {})

            # Generate encryption key for this document
            doc_key = Fernet.generate_key()
            doc_fernet = Fernet(doc_key)

            # Encrypt document data
            encrypted_doc = doc_fernet.encrypt(document_data.encode())
            encrypted_doc_b64 = base64.urlsafe_b64encode(encrypted_doc).decode()

            # Encode key in base64
            key_b64 = base64.b64encode(doc_key).decode()

            # Create QR payload: key(b64)|data|metadata
            qr_payload = f"{key_b64}|{document_id}|{document_type}|{encrypted_doc_b64}|{json.dumps(metadata)}"

            # Store in Redis with TTL for verification
            qr_id = str(uuid.uuid4())
            storage_data = {
              "qr_id": qr_id,
              "document_id": document_id,
              "document_type": document_type,
              "key": key_b64,
              "data_encrypted": encrypted_doc_b64,
              "metadata": metadata,
              "created_at": time.time()
            }
            r.setex(f"document_qr:{qr_id}", 86400, json.dumps(storage_data))  # 24h TTL

            logger.info(f"Document QR generated: {qr_id} for doc {document_id}")
            return jsonify({
              "qr_id": qr_id,
              "document_id": document_id,
              "qr_payload": qr_payload,
              "expires_in": 86400
            }), 201
          except Exception as e:
            logger.error(f"Document QR generation failed: {e}")
            return jsonify({"error": "Document QR generation failed"}), 500

      @app.route("/api/qr/verify-document", methods=["POST"])
      def verify_document_qr():
          """
          Verify document QR. Parse key(b64)|data|metadata format
          """
          try:
            data = request.get_json(force=True)
            qr_payload = data.get("qr_payload")

            if not qr_payload:
              return jsonify({"error": "Missing qr_payload"}), 400

            # Parse QR payload: key(b64)|document_id|document_type|encrypted_data|metadata
            parts = qr_payload.split("|", 4)
            if len(parts) < 4:
              return jsonify({"error": "Invalid QR format"}), 400

            key_b64, document_id, document_type, encrypted_doc_b64 = parts[:4]
            metadata_str = parts[4] if len(parts) > 4 else "{}"

            try:
              metadata = json.loads(metadata_str)
            except:
              metadata = {}

            # Decode and verify key
            try:
              doc_key = base64.b64decode(key_b64)
              doc_fernet = Fernet(doc_key)
              encrypted_doc = base64.urlsafe_b64decode(encrypted_doc_b64)
              decrypted_doc = doc_fernet.decrypt(encrypted_doc).decode()
            except Exception as e:
              logger.error(f"Document decryption failed: {e}")
              return jsonify({"error": "Invalid document key or data"}), 400

            # Create session for verified document
            session_id = str(uuid.uuid4())
            session_data = {
              "document_id": document_id,
              "document_type": document_type,
              "created_at": time.time()
            }
            r.setex(f"doc_session:{session_id}", 3600, json.dumps(session_data))

            logger.info(f"Document QR verified: {document_id}")
            return jsonify({
              "session_id": session_id,
              "document_id": document_id,
              "document_type": document_type,
              "document_data": decrypted_doc,
              "metadata": metadata,
              "expires_in": 3600
            }), 200
          except Exception as e:
            logger.error(f"Document QR verification failed: {e}")
            return jsonify({"error": "Document QR verification failed"}), 500

      @app.route("/api/qr/verify", methods=["POST"])
      def verify_qr():
          """
          Verify QR nonce and perform ML-KEM session establishment with officer's public key
          Returns session_key and session_id for subsequent authenticated requests
          """
          try:
            data = request.get_json(force=True)
            nonce = data.get("nonce")
            qr_data_encrypted = data.get("qr_data")
            user_public_key_pem = data.get("user_public_key_pem")
            
            if not all([nonce, qr_data_encrypted, user_public_key_pem]):
              return jsonify({"error": "Missing nonce, qr_data, or user_public_key_pem"}), 400

            # Decrypt and verify QR payload
            try:
              encrypted_payload = base64.urlsafe_b64decode(qr_data_encrypted)
              decrypted_payload = fernet.decrypt(encrypted_payload).decode()
              qr_claims = json.loads(decrypted_payload)
            except Exception as e:
              logger.error(f"QR decryption failed: {e}")
              return jsonify({"error": "Invalid QR data"}), 400

            # Verify nonce is in Redis (hasn't expired or been used)
            user_id = r.get(f"qr_pending:{nonce}")
            if not user_id:
              logger.warning(f"QR nonce {nonce} not found or expired")
              return jsonify({"error": "Nonce expired or invalid"}), 401

            # Verify nonce matches QR payload
            if nonce != qr_claims.get("nonce"):
              logger.warning(f"Nonce mismatch for user {user_id}")
              return jsonify({"error": "Nonce mismatch"}), 401

            # Verify timestamp not too old
            qr_iat = qr_claims.get("iat", 0)
            if time.time() - qr_iat > qr_ttl:
              logger.warning(f"QR expired for user {user_id}")
              return jsonify({"error": "QR expired"}), 401

            # Perform FIPS 203 (ML-KEM) session establishment
            try:
              kem_ciphertext, shared_secret = mlkem_encapsulate(
                user_public_key_pem
              )
              session_key_b64 = derive_session_key(shared_secret, nonce)
              kem_ciphertext_b64 = base64.b64encode(kem_ciphertext).decode()

              # Store session in Redis with TTL
              session_id = str(uuid.uuid4())
              session_data = {
                "user_id": user_id,
                "session_key": session_key_b64,
                "created_at": time.time(),
                "nonce": nonce,
                "kem_algorithm": mlkem_algorithm,
                "kem_ciphertext": kem_ciphertext_b64
              }
              r.setex(f"session:{session_id}", 3600, json.dumps(session_data))  # 1 hour session

              # Remove used nonce
              r.delete(f"qr_pending:{nonce}")

              logger.info(f"QR verified and ML-KEM session created for user {user_id}")
              return jsonify({
                "session_id": session_id,
                "session_key": session_key_b64,
                "kem_ciphertext": kem_ciphertext_b64,
                "kem_algorithm": mlkem_algorithm,
                "user_id": user_id,
                "expires_in": 3600
              }), 200

            except Exception as e:
              logger.error(f"FIPS 203 key exchange failed: {e}")
              return jsonify({"error": "Key exchange failed"}), 500

          except Exception as e:
            logger.error(f"QR verification failed: {e}")
            return jsonify({"error": "QR verification failed"}), 500

      @app.route("/health")
      def health():
          try:
            r.ping()
            return jsonify({"status": "ok"}), 200
          except:
            return jsonify({"status": "error"}), 500

      if __name__ == "__main__":
          app.run(host="0.0.0.0", port=5002, debug=False)

      @app.route("/health")
      def health():
          try:
            r.ping()
            return jsonify({"status": "ok"}), 200
          except:
            return jsonify({"status": "error"}), 500

      if __name__ == "__main__":
          app.run(host="0.0.0.0", port=5002, debug=False)

- name: Write qr-service Dockerfile
  copy:
    dest: /opt/govportal/qr-service/Dockerfile
    mode: '0644'
    content: |
      FROM python:3.11-slim
      WORKDIR /app
      RUN pip install --no-cache-dir flask redis cryptography requests
      COPY app.py .
      COPY openssl/ /opt/openssl/
      ENV OPENSSL_BIN=/opt/openssl/bin/openssl
      ENV OPENSSL_LIB_DIR=/opt/openssl/lib64
      ENV OPENSSL_MODULES=/opt/openssl/lib64/ossl-modules
      ENV LD_LIBRARY_PATH=/opt/openssl/lib64
      EXPOSE 5002
      CMD ["python", "app.py"]

- name: Ensure qr-service OpenSSL bundle directories exist
  file:
    path: /opt/govportal/qr-service/openssl/providers
    state: directory
    mode: '0755'

- name: Copy VM-built OpenSSL install for ML-KEM support
  shell: |
    set -e
    rm -rf /opt/govportal/qr-service/openssl
    cp -a /opt/openssl /opt/govportal/qr-service/openssl
  args:
    executable: /bin/bash

- name: Build and run qr-service container
  shell: |
    set -e
    REDIS_PASS=$(cat /root/redis-pass.txt)
    
    docker network inspect internal-net >/dev/null 2>&1 || docker network create internal-net
    docker build -t govportal-qr-service /opt/govportal/qr-service
    docker rm -f qr-service >/dev/null 2>&1 || true
    docker run -d --name qr-service \
      --network internal-net \
      --restart unless-stopped \
      --health-cmd="python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5002/health')\" || exit 1" \
      --health-interval=10s \
      --health-timeout=5s \
      --health-retries=3 \
      -e REDIS_HOST=redis \
      -e REDIS_PORT=6379 \
      -e REDIS_PASS="${REDIS_PASS}" \
      -e QR_FERNET_KEY="{{ hostvars.get('internal-vm', {}).get('qr_fernet_key', 'Z292cG9ydGFsLXFyLWZhbGxiYWNrLWtleS0xMjM0NTY=') }}" \
      -e QR_TTL=300 \
      -e OPENSSL_BIN=/opt/openssl/bin/openssl \
      -e OPENSSL_LIB_DIR=/opt/openssl/lib64 \
      -e OPENSSL_MODULES=/opt/openssl/lib64/ossl-modules \
      -e STORAGE_SERVICE_URL="http://storage-service:9003" \
      -p {{ internal_bind_ip }}:5002:5002 \
      govportal-qr-service
  args:
    executable: /bin/bash
  changed_when: true
