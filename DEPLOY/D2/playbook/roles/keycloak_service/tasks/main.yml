- name: Ensure Keycloak seed directory exists
  file:
    path: /opt/govportal/keycloak
    state: directory
    mode: '0755'

- name: Ensure Keycloak OpenSSL bundle directories exist
  file:
    path: /opt/openssl/providers
    state: directory
    mode: '0755'

- name: Write realm import file
  copy:
    dest: /opt/govportal/keycloak/realm-govportal.json
    mode: '0644'
    content: |
      {
        "realm": "govportal",
        "enabled": true,
        "accessTokenLifespan": 900,
        "refreshTokenMaxReuse": 0,
        "defaultSignatureAlgorithm": "EdDSA",
        "roles": {
          "realm": [
            {"name": "CITIZEN"},
            {"name": "OFFICER"},
            {"name": "ADMIN"},
            {"name": "AUDITOR"}
          ]
        },
        "clients": [
          {
            "clientId": "citizens-app",
            "protocol": "openid-connect",
            "publicClient": true,
            "standardFlowEnabled": true,
            "directAccessGrantsEnabled": true,
            "redirectUris": ["http://localhost:3000/*", "http://localhost:8080/*"],
            "attributes": {
              "pkce.code.challenge.method": "S256",
              "dpop.bound.access.tokens": "true"
            }
          }
        ]
      }

- name: Generate secure random password for Postgres (if not exists)
  shell: |
    if [ -f /root/keycloak-creds.txt ]; then
      source /root/keycloak-creds.txt
      echo "$PG_PASS"
    else
      # Generate strong passwords
      export LD_LIBRARY_PATH=/opt/openssl/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      PG_PASS=$(/opt/openssl/bin/openssl rand -base64 32)
      KC_ADMIN_PASS=$(/opt/openssl/bin/openssl rand -base64 32)
      echo "PG_PASS=${PG_PASS}" > /root/keycloak-creds.txt
      echo "KC_ADMIN_PASS=${KC_ADMIN_PASS}" >> /root/keycloak-creds.txt
      chmod 600 /root/keycloak-creds.txt
      echo "$PG_PASS"
    fi
  register: pg_pass_result
  changed_when: false
  args:
    executable: /bin/bash

- name: Generate secure random password for Keycloak admin (if not exists)
  shell: |
    source /root/keycloak-creds.txt
    echo "$KC_ADMIN_PASS"
  register: kc_admin_pass_result
  changed_when: false
  args:
    executable: /bin/bash

- name: Run Postgres and Keycloak containers with secure credentials
  shell: |
    set -e
    source /root/keycloak-creds.txt
    
    docker network inspect internal-net >/dev/null 2>&1 || docker network create internal-net
    docker volume inspect postgres-data >/dev/null 2>&1 || docker volume create postgres-data
    docker rm -f postgres keycloak >/dev/null 2>&1 || true

    docker run -d --name postgres \
      --network internal-net \
      --restart unless-stopped \
      -e POSTGRES_DB=keycloak \
      -e POSTGRES_USER=keycloak \
      -e POSTGRES_PASSWORD="${PG_PASS}" \
      -v postgres-data:/var/lib/postgresql/data \
      postgres:16

    docker run -d --name keycloak \
      --network internal-net \
      --restart unless-stopped \
      -p {{ internal_bind_ip }}:8080:8080 \
      -e KC_DB=postgres \
      -e KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak \
      -e KC_DB_USERNAME=keycloak \
      -e KC_DB_PASSWORD="${PG_PASS}" \
      -e KEYCLOAK_ADMIN=admin \
      -e KEYCLOAK_ADMIN_PASSWORD="${KC_ADMIN_PASS}" \
      -v /opt/govportal/keycloak/realm-govportal.json:/opt/keycloak/data/import/realm.json:ro \
      quay.io/keycloak/keycloak:24.0 \
      start-dev --import-realm
  args:
    executable: /bin/bash
  changed_when: true
