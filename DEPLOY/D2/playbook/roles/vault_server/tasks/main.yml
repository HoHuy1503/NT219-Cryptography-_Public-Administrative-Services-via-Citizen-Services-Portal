---
- name: Add HashiCorp GPG key
  apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present

- name: Add HashiCorp repo
  apt_repository:
    repo: deb https://apt.releases.hashicorp.com jammy main
    state: present

- name: Install Vault dependencies
  apt:
    name:
      - vault
      - jq
    state: present
    update_cache: yes

- name: Ensure Vault directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: vault
    group: vault
    mode: '0750'
  loop:
    - /etc/vault.d
    - /opt/vault
    - /opt/vault/data

- name: Create Vault config
  copy:
    dest: /etc/vault.d/vault.hcl
    content: |
      storage "file" { path = "/opt/vault/data" }
      listener "tcp" {
        address = "0.0.0.0:8200"
        tls_disable = true
      }
      api_addr = "http://10.0.3.10:8200"
      ui = true

- name: Start and enable Vault
  systemd:
    name: vault
    state: started
    enabled: yes

- name: Wait for Vault to be ready
  wait_for:
    port: 8200
    delay: 3
    timeout: 30

- name: Check Vault initialization status
  command: vault status -format=json
  register: vault_status
  failed_when: false
  changed_when: false
  environment:
    VAULT_ADDR: http://127.0.0.1:8200

- name: Init Vault (only if not initialized)
  shell: |
    set -euo pipefail
    vault operator init -key-shares=1 -key-threshold=1 -format=json > /root/vault-init.json
    vault operator unseal "$(jq -r .unseal_keys_b64[0] /root/vault-init.json)"
    echo 'Vault initialized and unsealed'
  when: not (vault_status.stdout | from_json).initialized
  args:
    executable: /bin/bash
  environment:
    VAULT_ADDR: http://127.0.0.1:8200

- name: Unseal Vault if already initialized
  shell: |
    set -euo pipefail
    if [ ! -f /root/vault-init.json ]; then
      echo 'vault-init.json not found, cannot unseal Vault'
      exit 1
    fi

    UNSEAL_KEY=$(jq -r .unseal_keys_b64[0] /root/vault-init.json)
    vault operator unseal "$UNSEAL_KEY"
    echo 'Vault unsealed'
  when: (vault_status.stdout | from_json).initialized and (vault_status.stdout | from_json).sealed
  args:
    executable: /bin/bash
  environment:
    VAULT_ADDR: http://127.0.0.1:8200

- name: Bootstrap Vault secrets engines
  shell: |
    set -euo pipefail
    export VAULT_ADDR=http://127.0.0.1:8200
    export VAULT_TOKEN=$(jq -r .root_token /root/vault-init.json)

    vault secrets list -format=json | jq -e 'has("transit/")' >/dev/null || vault secrets enable transit
    vault read transit/keys/mldsa-doc-signing >/dev/null 2>&1 || vault write -f transit/keys/mldsa-doc-signing type=ed25519 >/dev/null
    vault read transit/keys/doc-encryption >/dev/null 2>&1 || vault write -f transit/keys/doc-encryption type=aes256-gcm96 >/dev/null

    vault secrets list -format=json | jq -e 'has("pki/")' >/dev/null || vault secrets enable pki
    vault secrets tune -max-lease-ttl=87600h pki
    # Generate an EC CA instead of the RSA default
    vault read pki/cert/ca >/dev/null 2>&1 || vault write -f pki/root/generate/internal common_name='GovPortal CA' ttl=87600h key_type='ec' >/dev/null
    vault read pki/roles/service-cert >/dev/null 2>&1 || vault write pki/roles/service-cert \
      allowed_domains=govportal.internal \
      allow_subdomains=true \
      max_ttl=2160h
  args:
    executable: /bin/bash
